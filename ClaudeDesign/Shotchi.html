<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shotchi — GLP-1 Journey Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shotchi-components.jsx"></script>
<script type="text/babel" src="shotchi-screens1.jsx"></script>
<script type="text/babel" src="shotchi-screens2.jsx"></script>
<script type="text/babel" src="shotchi-screens3.jsx"></script>
<script type="text/babel" src="shotchi-screens4.jsx"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0f1117;
  background-image:radial-gradient(ellipse at 20% 50%,#1a2635 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,#1a1f2e 0%,transparent 50%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',system-ui,sans-serif;overflow:hidden;
}

/* ── Adi animations ── */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-13px) scale(1.06)}60%{transform:translateY(-6px) scale(0.97)}}
@keyframes droop{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(4px) rotate(-2deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes sparkle{0%,100%{transform:scale(0) rotate(0deg);opacity:0}50%{transform:scale(1) rotate(180deg);opacity:1}}

/* ── Screen transitions ── */
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft {from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide-forward{animation:slideInRight 0.28s cubic-bezier(0.22,1,0.36,1);}
.slide-back   {animation:slideInLeft  0.28s cubic-bezier(0.22,1,0.36,1);}
.fade-in      {animation:fadeIn 0.25s ease;}

/* ── Button ripple ── */
@keyframes rippleOut{from{transform:scale(0);opacity:1}to{transform:scale(4);opacity:0}}

/* ── Celebration ── */
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(600px) rotate(720deg);opacity:0}}
@keyframes scaleIn{0%{transform:scale(0.65);opacity:0}80%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}

/* ── Tweaks panel ── */
.tweaks-panel{
  position:fixed;bottom:20px;right:20px;z-index:9999;
  background:white;border-radius:20px;
  box-shadow:0 8px 40px rgba(0,0,0,0.25);
  padding:18px;width:230px;
  display:none;animation:scaleIn 0.2s ease;
}
.tweaks-panel.open{display:block;}

::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#7BAF8E",
  "darkMode": true
}/*EDITMODE-END*/;

function usePersisted(key, def) {
  const [val, setVal] = useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}
  });
  const set = v => { setVal(v); try{localStorage.setItem(key,JSON.stringify(v));}catch{} };
  return [val, set];
}

// Screen nav order for forward/back detection
const SCREEN_ORDER = ['onboarding','home','log','sideeffects','history','timeline','achievements','weighthistory','doctorreport','settings'];
const SCREEN_LABELS = {
  onboarding:'① Onboarding', home:'② Home', log:'③ Log Shot',
  sideeffects:'④ Side Effects', history:'⑤ History',
  timeline:'⑥ Med Timeline', achievements:'⑦ Achievements',
  weighthistory:'⑧ Weight Log', doctorreport:'⑨ Dr Report', settings:'⑩ Settings',
};

function App() {
  const [accent, setAccent]   = usePersisted('shotchi_accent', TWEAK_DEFAULTS.accentColor);
  const [dark, setDark]       = usePersisted('shotchi_dark', TWEAK_DEFAULTS.darkMode);
  const [screen, setScreen]   = usePersisted('shotchi_screen', 'home');
  const [showCelebration, setShowCelebration] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [slideDir, setSlideDir] = useState('forward');
  const prevScreen = useRef(screen);

  // Tweaks host bridge
  useEffect(()=>{
    window.addEventListener('message', e=>{
      if(e.data?.type==='__activate_edit_mode')   setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode')  setTweaksOpen(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  const navigate = (to) => {
    const fromIdx = SCREEN_ORDER.indexOf(screen);
    const toIdx   = SCREEN_ORDER.indexOf(to);
    setSlideDir(toIdx >= fromIdx ? 'forward' : 'back');
    prevScreen.current = screen;
    setScreen(to);
  };

  const theme = makeTheme(dark, accent);

  const accentOptions = [
    {color:'#7BAF8E',label:'Sage'},
    {color:'#7B8EAF',label:'Blue'},
    {color:'#AF7B9C',label:'Pink'},
    {color:'#AF9C7B',label:'Amber'},
    {color:'#7BAFAF',label:'Teal'},
  ];

  const handleAccentChange = (c) => {
    setAccent(c);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:c}},'*');
  };
  const handleDarkChange = (v) => {
    setDark(v);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{darkMode:v}},'*');
  };

  const animClass = slideDir==='forward' ? 'slide-forward' : 'slide-back';

  function renderScreen() {
    switch(screen) {
      case 'onboarding':  return <OnboardingScreen onFinish={()=>navigate('home')}/>;
      case 'home':        return <HomeScreen onNav={navigate} onLog={()=>navigate('log')}/>;
      case 'log':         return <LogShotScreen onNav={navigate}/>;
      case 'sideeffects': return <SideEffectsScreen onNav={navigate} onSave={()=>navigate('home')}/>;
      case 'history':     return <HistoryScreen onNav={navigate}/>;
      case 'timeline':    return <MedTimelineScreen onNav={navigate}/>;
      case 'achievements':   return <AchievementsScreen onNav={navigate}/>;
      case 'weighthistory':  return <WeightHistoryScreen onNav={navigate}/>;
      case 'doctorreport':   return <DoctorReportScreen onNav={navigate}/>;
      case 'settings':       return <SettingsScreen onNav={navigate} onAccentChange={handleAccentChange} onDarkChange={handleDarkChange}/>;
      default:               return <HomeScreen onNav={navigate} onLog={()=>navigate('log')}/>;
    }
  }

  return (
    <ThemeContext.Provider value={theme}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:18,padding:'16px 0'}}>

        {/* Title */}
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:21,fontWeight:900,color:'white',letterSpacing:0.4}}>
            <span style={{color:accent}}>Shotchi</span> · UI Prototype
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.3)',fontWeight:600,marginTop:2}}>8 screens · tap to navigate</div>
        </div>

        {/* Screen nav pills */}
        <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',maxWidth:440}}>
          {SCREEN_ORDER.map(s=>(
            <button key={s} onClick={()=>navigate(s)} style={{
              padding:'5px 12px',borderRadius:999,border:'none',
              fontFamily:'Nunito,sans-serif',fontSize:12,fontWeight:700,
              cursor:'pointer',transition:'all 0.15s',
              background:screen===s?accent:'rgba(255,255,255,0.09)',
              color:screen===s?'white':'rgba(255,255,255,0.45)',
              boxShadow:screen===s?`0 4px 14px ${accent}55`:'none',
            }}>{SCREEN_LABELS[s]}</button>
          ))}
          <button onClick={()=>setShowCelebration(true)} style={{
            padding:'5px 12px',borderRadius:999,border:'none',
            fontFamily:'Nunito,sans-serif',fontSize:12,fontWeight:700,cursor:'pointer',
            background:'rgba(255,255,255,0.09)',color:'rgba(255,255,255,0.45)',
          }}>🎉 Celebration</button>
        </div>

        {/* Phone */}
        <IOSDevice width={390} height={790} dark={dark}>
          <div style={{
            position:'relative',height:'100%',
            display:'flex',flexDirection:'column',
            paddingTop:62,paddingBottom:34,overflow:'hidden',
          }}>
            {/* Screen with slide transition */}
            <div key={screen} className={animClass}
              style={{flex:1,minHeight:0,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              {renderScreen()}
            </div>
            {showCelebration && <CelebrationModal onClose={()=>setShowCelebration(false)}/>}
          </div>
        </IOSDevice>

        {/* Dark mode quick toggle below phone */}
        <button onClick={()=>handleDarkChange(!dark)} style={{
          display:'flex',alignItems:'center',gap:7,
          padding:'7px 16px',borderRadius:999,border:'none',
          background:'rgba(255,255,255,0.09)',color:'rgba(255,255,255,0.55)',
          fontFamily:'Nunito,sans-serif',fontSize:12,fontWeight:700,cursor:'pointer',
          transition:'all 0.2s',
        }}>{dark?'☀️ Light mode':'🌙 Dark mode'}</button>
      </div>

      {/* Tweaks panel */}
      <div className={`tweaks-panel ${tweaksOpen?'open':''}`}>
        <div style={{fontSize:14,fontWeight:900,color:'#222',marginBottom:14}}>Tweaks</div>

        <div style={{fontSize:11,fontWeight:800,color:'#aaa',marginBottom:8,textTransform:'uppercase',letterSpacing:0.5}}>Adi's Color</div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {accentOptions.map(a=>(
            <button key={a.color} onClick={()=>handleAccentChange(a.color)} style={{
              display:'flex',flexDirection:'column',alignItems:'center',gap:4,
              background:'none',border:'none',cursor:'pointer',
            }}>
              <div style={{
                width:28,height:28,borderRadius:14,background:a.color,
                boxShadow:accent===a.color?`0 0 0 2px white,0 0 0 4px ${a.color}`:'none',
                transition:'box-shadow 0.15s',
              }}/>
              <span style={{fontSize:9,color:'#888',fontWeight:700}}>{a.label}</span>
            </button>
          ))}
        </div>

        <div style={{fontSize:11,fontWeight:800,color:'#aaa',marginBottom:8,textTransform:'uppercase',letterSpacing:0.5}}>Appearance</div>
        <button onClick={()=>handleDarkChange(!dark)} style={{
          width:'100%',padding:'8px',borderRadius:10,border:'1.5px solid #eee',
          background:dark?'#111':'#f9f9f9',color:dark?'white':'#333',
          fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'Nunito,sans-serif',
          marginBottom:14,
        }}>{dark?'☀️ Switch to Light':'🌙 Switch to Dark'}</button>

        <div style={{fontSize:11,fontWeight:800,color:'#aaa',marginBottom:8,textTransform:'uppercase',letterSpacing:0.5}}>Jump to Screen</div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {SCREEN_ORDER.map(s=>(
            <button key={s} onClick={()=>navigate(s)} style={{
              textAlign:'left',padding:'6px 10px',borderRadius:8,border:'none',
              background:screen===s?`${accent}20`:'#f5f5f5',
              color:screen===s?accent:'#666',fontWeight:700,fontSize:12,
              cursor:'pointer',fontFamily:'Nunito,sans-serif',
            }}>{SCREEN_LABELS[s]}</button>
          ))}
        </div>
      </div>
    </ThemeContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
